title: "Ruomeng Liu"
tagline: ""
description: "M.Phil. candidate, JMSC, The University of Hong Kong"
author: "Ruomeng Liu"
#email: "ruomeng.6@connect.hku.hk"
baseurl: ""
url: "https://liuruomeng.github.io"
lang: "en"

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  auto_ids: true

permalink: pretty
strict_front_matter: false

# Top nav links (kept short — single primary tab + a couple of supporting ones)
nav:
  - title: "Home"
    url: "/"
  - title: "Research"
    url: "/research/"
  - title: "CV"
    url: "/cv/"

# Social links (icon row)
social:
  - name: "GitHub"
    url: "https://github.com/liuruomeng"
    icon: "github"
  - name: "X"
    url: "https://x.com/liu_ruomeng"
    icon: "x"
  - name: "LinkedIn"
    url: "https://www.linkedin.com/in/ruomeng-liu/"
    icon: "linkedin"

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-optional-front-matter

repository: liuruomeng/liuruomeng.github.io

sass:
  style: compressed
  sass_dir: _sass

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
  - node_modules
  - README.md
  - LICENSE
  - .RData
  - .Rhistory
  - .rubocop.yml
  - .travis.yml
  - jekyll-theme-minimal.gemspec
  - script
  - docs
